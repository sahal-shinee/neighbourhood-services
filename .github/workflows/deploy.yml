name: Deploy to Rumahweb

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger cPanel Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger cPanel Git Pull
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: cpanel ${{ secrets.CPANEL_TOKEN }}" \
            "${{ secrets.CPANEL_URL }}/execute/VersionControl/update?repository_root=${{ secrets.REPO_PATH }}"
