name: Deploy to Rumahweb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, mbstring, xml, zip, pdo, pdo_mysql
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Zip vendor folder
        run: zip -r vendor.zip vendor/ && rm -rf vendor/

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM & Build Assets
        run: |
          npm ci
          npm run build

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          MIRROR_CMD="mirror -R --parallel=5 --exclude-glob .git --exclude-glob .github --exclude-glob node_modules --exclude-glob .env --exclude-glob .env.production --exclude-glob README.md . /"
          lftp -u "$FTP_USER,$FTP_PASS" "$FTP_HOST" -e "set ftp:ssl-allow no; set ftp:use-site-symlink no; set net:max-retries 3; $MIRROR_CMD; bye"
